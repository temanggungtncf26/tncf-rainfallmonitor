<!-- Main App Container -->

<script>
/* ================= GLOBAL VARIABLES ================= */
let currentUser = JSON.parse(localStorage.getItem('ch_app_user')) || null;
let siteMapping = {}; 
let normalDataMapping = {};
let myChartCH = null;
let myChartHH = null;
let historyData = []; // Wadah penyimpan data riwayat untuk fitur Edit
const isSimulated = typeof google === 'undefined';

// Data Simulasi (Hanya aktif di Mode Preview Canvas)
const mockUsers = [
    { username: "DAWAM", password: "SUPER26", nama: "DAWAM", role: "MANAGER", site: "ALL" },
    { username: "ADMIN", password: "ADMIN26", nama: "Administrator", role: "ADMIN", site: "ALL" },
    { username: "TEMANGGUNG", password: "TMG26", nama: "Staff TMG", role: "STAFF", site: "TEMANGGUNG" },
    { username: "MRANGGEN", password: "MRG26", nama: "Staff MRG", role: "STAFF", site: "MRANGGEN" }
];
const mockDB = [
    {ID: "1", Tanggal: "2024-01-01", Site: "TEMANGGUNG", OBS: "SIN1", Data_Ombro: 95, Nilai_CH: 10.00},
    {ID: "2", Tanggal: "2024-01-02", Site: "TEMANGGUNG", OBS: "SIN2", Data_Ombro: 47.5, Nilai_CH: 5.00}
];

/* ================= INITIALIZATION ================= */
window.onload = function() {
    if (isSimulated) {
        siteMapping = { "TEMANGGUNG": ["SIN1", "SIN2"], "MADURA": ["GNG1"] };
        normalDataMapping = { "TEMANGGUNG": [384, 336, 314, 268, 162, 92, 43, 41, 62, 165, 284, 336] };
        checkLoginState();
    } else {
        google.script.run.withSuccessHandler(function(data) {
            if (data.success && Object.keys(data.data).length > 0) siteMapping = data.data;
            google.script.run.withSuccessHandler(function(res) {
                if (res.success) normalDataMapping = res.data;
                checkLoginState();
            }).getNormalData();
        }).getSiteSettings();
    }
};

function startLoading(text) {
    document.getElementById('loading-text').innerText = text || "Memproses...";
    document.getElementById('loading-overlay').style.display = 'flex';
}

function endLoading() {
    document.getElementById('loading-overlay').style.display = 'none';
}

function checkLoginState() {
    if (!currentUser) renderLogin();
    else renderMainLayout();
}

/* ================= VIEW: LOGIN ================= */
function renderLogin() {
    document.getElementById('app').innerHTML = `
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card p-4 shadow-lg w-100" style="max-width: 340px;">
            <div class="text-center mb-2">
                <img src="https://lh3.googleusercontent.com/d/1yZzBh3-H97ujnjbWC34qGKjd8SmCdHP7" alt="Logo Aplikasi" style="max-width: 260px; margin-bottom: 5px;">
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="mb-2"><label class="form-label small fw-bold mb-1">User ID</label><input type="text" id="username" class="form-control" required placeholder="Contoh: ADMIN"></div>
                <div class="mb-3"><label class="form-label small fw-bold mb-1">Password</label><input type="password" id="password" class="form-control" required></div>
                <button type="submit" class="btn btn-primary w-100 fw-bold mt-2">MASUK</button>
            </form>
        </div>
    </div>`;
}

function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim().toUpperCase();
    const p = document.getElementById('password').value;
    
    startLoading("Verifikasi...");
    if (isSimulated) {
        setTimeout(() => {
            endLoading();
            const user = mockUsers.find(x => x.username === u && x.password === p); 
            if (user) {
                currentUser = user;
                localStorage.setItem('ch_app_user', JSON.stringify(user));
                checkLoginState();
            } else {
                Swal.fire('Error', 'User/Password salah (Cek Mode Preview)', 'error');
            }
        }, 500);
    } else {
        google.script.run.withSuccessHandler(res => {
            endLoading();
            if (res.success) {
                currentUser = res.user;
                localStorage.setItem('ch_app_user', JSON.stringify(currentUser));
                checkLoginState();
            } else {
                Swal.fire('Gagal', res.message, 'error');
            }
        }).loginUser({username: u, password: p});
    }
}

function handleLogout() {
    localStorage.removeItem('ch_app_user');
    currentUser = null;
    checkLoginState();
}

/* ================= VIEW: MAIN LAYOUT ================= */
function renderMainLayout() {
    const allMenus = [
        { id: 'dashboard', title: 'Dashboard', icon: 'fas fa-chart-line', roles: ['ADMIN','MANAGER','STAFF'] },
        { id: 'input', title: 'Input Data', icon: 'fas fa-edit', roles: ['ADMIN','STAFF'] },
        { id: 'history', title: 'Riwayat', icon: 'fas fa-history', roles: ['ADMIN','STAFF'] },
        { id: 'recap', title: 'Rekapitulasi', icon: 'fas fa-table', roles: ['ADMIN','MANAGER','STAFF'] },
        { id: 'obs', title: 'Kelola OBS', icon: 'fas fa-map-marked-alt', roles: ['ADMIN'] },
        { id: 'normals', title: 'Data Normal', icon: 'fas fa-cloud-sun', roles: ['ADMIN'] },
        { id: 'users', title: 'Kelola User', icon: 'fas fa-users', roles: ['ADMIN'] }
    ];
    
    const myMenus = allMenus.filter(m => m.roles.includes(currentUser.role));
    
    let navHTML = myMenus.map(m => 
        `<a href="#" class="nav-link" id="nav-${m.id}" onclick="switchMenu('${m.id}')"><i class="${m.icon} me-2"></i> ${m.title}</a>`
    ).join('');

    let mobileNavHTML = myMenus.slice(0, 4).map(m => 
        `<a href="#" class="text-dark text-center text-decoration-none" onclick="switchMenu('${m.id}')" style="width: 25%">
            <div class="fs-5"><i class="${m.icon}"></i></div><div style="font-size: 10px">${m.title.split(' ')[0]}</div>
        </a>`
    ).join('');

    document.getElementById('app').innerHTML = `
    <div class="container-fluid p-0">
                <div class="d-md-none glass-mobile-top p-3 d-flex justify-content-between align-items-center sticky-top shadow-sm" style="color: #2d3748;">
            <img src="https://lh3.googleusercontent.com/d/1yZzBh3-H97ujnjbWC34qGKjd8SmCdHP7" alt="Logo" style="max-height: 35px; padding: 3px; border-radius: 5px;">
            <button class="btn btn-sm btn-outline-secondary fw-bold" onclick="handleLogout()">LOGOUT</button>
        </div>

        <div class="row g-0">
                        <nav class="sidebar d-none d-md-flex flex-column">
                <div class="text-center px-3 mb-4">
                    <img src="https://lh3.googleusercontent.com/d/1yZzBh3-H97ujnjbWC34qGKjd8SmCdHP7" alt="Logo" style="max-width: 220px; width: 85%; display: block; margin: 0 auto 15px auto;">
                    <div><span class="badge bg-secondary shadow-sm">${currentUser.site}</span></div>
                </div>
                <div class="flex-grow-1">${navHTML}</div>
                <div class="px-3 mt-auto">
                    <hr>
                    <div class="small text-muted mb-2 text-truncate">${currentUser.nama}</div>
                    <button class="btn btn-outline-danger w-100 btn-sm fw-bold" onclick="handleLogout()">LOGOUT</button>
                </div>
            </nav>

                        <main class="main-content" id="main-content"></main>
        </div>

                <div class="d-md-none glass-mobile-nav fixed-bottom d-flex justify-content-around py-2 shadow-lg" style="z-index: 1000;">${mobileNavHTML}</div>
    </div>`;

    switchMenu('dashboard');
}

function switchMenu(menuId) {
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    const navEl = document.getElementById('nav-' + menuId);
    if(navEl) navEl.classList.add('active');

    const container = document.getElementById('main-content');
    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';

    setTimeout(() => {
        if (menuId === 'dashboard') renderDashboard(container);
        else if (menuId === 'input') renderInput(container);
        else if (menuId === 'history') renderHistory(container);
        else if (menuId === 'recap') renderRecap(container);
        else if (menuId === 'users') renderUsers(container);
        else if (menuId === 'obs') renderObsManagement(container);
        else if (menuId === 'normals') renderNormalDataManagement(container);
    }, 100);
}

/* ================= VIEW: DASHBOARD ================= */
function renderDashboard(container) {
    const isAdminManager = ['ADMIN', 'MANAGER'].includes(currentUser.role);
    const sites = Object.keys(siteMapping);
    const year = new Date().getFullYear();

    container.innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div><h4 class="mb-0">Dashboard</h4><small class="text-muted">Site: ${currentUser.site}</small></div>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <select id="dash-year" class="form-select form-select-sm w-auto" onchange="refreshDashboardData()">
                <option value="${year}">${year}</option><option value="${year-1}">${year-1}</option>
            </select>
            <select id="dash-period" class="form-select form-select-sm w-auto" onchange="refreshDashboardData()">
                <option value="MONTHLY">Bulanan</option><option value="DASARIAN">Dasarian</option><option value="WEEKLY">Mingguan</option>
            </select>
            ${isAdminManager ? `<select id="dash-site-filter" class="form-select form-select-sm w-auto" onchange="refreshDashboardData()"><option value="ALL">Semua Site</option>${sites.map(s => `<option value="${s}">${s}</option>`).join('')}</select>` : ''}
            <button class="btn btn-info text-white btn-sm fw-bold" onclick="downloadPNG()"><i class="fas fa-image me-1"></i> PNG</button>
        </div>
    </div>
    <div id="dashboard-print">
        <div class="row g-4">
            <div class="col-12"><div class="card p-3" style="height: 350px;"><h6 class="text-primary fw-bold">Grafik Curah Hujan (CH)</h6><div style="position:relative; height:100%"><canvas id="chartCH"></canvas></div></div></div>
            <div class="col-12"><div class="card p-3" style="height: 350px;"><h6 class="text-success fw-bold">Grafik Hari Hujan (HH)</h6><div style="position:relative; height:100%"><canvas id="chartHH"></canvas></div></div></div>
        </div>
    </div>`;
    refreshDashboardData();
}

function refreshDashboardData() {
    const filterSite = (currentUser.role === 'STAFF') ? currentUser.site : (document.getElementById('dash-site-filter')?.value || 'ALL');
    const filterYear = parseInt(document.getElementById('dash-year').value);
    const filterPeriod = document.getElementById('dash-period').value;

    fetchData(data => {
        const filtered = data.filter(d => {
            const dt = new Date(d.Tanggal);
            return dt.getFullYear() === filterYear && (filterSite === 'ALL' || d.Site === filterSite);
        });
        updateCharts(filtered, filterPeriod, filterSite);
    });
}

function updateCharts(data, period, site) {
    let labels = [], chData = [], hhData = [];
    const months = ["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];

    // MENGHITUNG JUMLAH OBS UNTUK PEMBAGI RATA-RATA
    const obsList = (site === 'ALL') ? [...new Set(data.map(d => d.OBS))] : (siteMapping[site] || []);
    const obsCount = obsList.length > 0 ? obsList.length : 1;

    if (period === 'MONTHLY') {
        labels = months;
        chData = new Array(12).fill(0); hhData = new Array(12).fill(0);
        data.forEach(d => {
            const m = new Date(d.Tanggal).getMonth();
            const v = parseFloat(d.Nilai_CH);
            chData[m] += v;
            if(v > 0.5) hhData[m]++;
        });
    } else if (period === 'DASARIAN') {
        months.forEach(m => labels.push(`${m}-1`, `${m}-2`, `${m}-3`));
        chData = new Array(36).fill(0); hhData = new Array(36).fill(0);
        data.forEach(d => {
            const dt = new Date(d.Tanggal);
            const m = dt.getMonth();
            const day = dt.getDate();
            let dIdx = 2; 
            if(day <= 10) dIdx = 0; else if(day <= 20) dIdx = 1;
            const idx = (m * 3) + dIdx;
            chData[idx] += parseFloat(d.Nilai_CH);
            if(parseFloat(d.Nilai_CH) > 0.5) hhData[idx]++;
        });
    } else { // WEEKLY
        months.forEach(m => labels.push(`${m}-1`, `${m}-2`, `${m}-3`, `${m}-4`));
        chData = new Array(48).fill(0); hhData = new Array(48).fill(0);
        data.forEach(d => {
            const dt = new Date(d.Tanggal);
            const m = dt.getMonth();
            const day = dt.getDate();
            let wIdx = 3; 
            if(day <= 7) wIdx = 0; else if(day <= 14) wIdx = 1; else if(day <= 21) wIdx = 2;
            const idx = (m * 4) + wIdx;
            chData[idx] += parseFloat(d.Nilai_CH);
            if(parseFloat(d.Nilai_CH) > 0.5) hhData[idx]++;
        });
    }

    // UBAH TOTAL MENJADI RATA-RATA (dibagi jumlah OBS, dibulatkan proporsional mutlak tanpa koma)
    chData = chData.map(val => Math.round(val / obsCount));
    hhData = hhData.map(val => Math.round(val / obsCount));

    if (myChartCH) myChartCH.destroy();
    if (myChartHH) myChartHH.destroy();

    // Chart CH with Normal Data Line
    let chDatasets = [{ label: 'CH Aktual (Rata-rata)', data: chData, borderColor: '#319795', backgroundColor: 'rgba(49, 151, 149, 0.1)', fill: true, tension: 0.3 }];
    if (period === 'MONTHLY' && site !== 'ALL' && normalDataMapping[site]) {
        chDatasets.push({ label: 'Normal 30Th', data: normalDataMapping[site], borderColor: '#d69e2e', borderDash: [5,5], pointRadius: 0, fill: false });
    }

    // Pengaturan untuk label angka di atas titik/batang grafik
    const labelOptions = {
        maintainAspectRatio: false,
        plugins: {
            datalabels: {
                color: '#444',
                anchor: 'end',
                align: 'top',
                offset: 2,
                font: { weight: 'bold', size: 10 },
                formatter: function(value) { return value; }
            }
        }
    };

    myChartCH = new Chart(document.getElementById('chartCH'), { 
        type: 'line', 
        plugins: [ChartDataLabels],
        data: { labels, datasets: chDatasets }, 
        options: labelOptions 
    });
    
    myChartHH = new Chart(document.getElementById('chartHH'), { 
        type: 'bar', 
        plugins: [ChartDataLabels],
        data: { labels, datasets: [{ label: 'Hari Hujan (Rata-rata)', data: hhData, backgroundColor: '#4fd1c5' }] }, 
        options: labelOptions 
    });
}

        }).then(canvas => {

function refreshRecapTable() {

function generateTableHTML(data, obsList, type, site) {
    const isCH = type.includes('CH');
    const isMonth = type.includes('MONTH');
    const isWeek = type.includes('WEEK');
    const months = ["JAN","FEB","MAR","APR","MEI","JUN","JUL","AGS","SEP","OKT","NOP","DES"];
    
    let cols = isMonth ? 12 : (isWeek ? 48 : 36);
    let colSums = new Array(cols).fill(0);
    
    let rowsHTML = obsList.map(obs => {
        let rowData = new Array(cols).fill(0);
        data.filter(d => d.OBS === obs).forEach(d => {
            const dt = new Date(d.Tanggal), m = dt.getMonth(), day = dt.getDate();
            const val = parseFloat(d.Nilai_CH);
            let idx = 0;
            if (isMonth) idx = m;
            else if (isWeek) { let w=3; if(day<=7)w=0; else if(day<=14)w=1; else if(day<=21)w=2; idx=m*4+w; }
            else { let das=2; if(day<=10)das=0; else if(day<=20)das=1; idx=m*3+das; }
            
            if (isCH) rowData[idx] += val; else if (val > 0.5) rowData[idx]++;
        });
        rowData.forEach((v, i) => colSums[i] += v);
        const cells = rowData.map(v => `<td>${isCH ? Math.round(v) : v}</td>`).join('');
        return `<tr><td class="col-obs">${obs}</td>${cells}</tr>`;
    }).join('');

    // Rata-rata Aktual
    const avgActual = colSums.map(sum => obsList.length > 0 ? sum / obsList.length : 0);
    const rowActual = `<tr class="row-calc"><td class="col-obs">Rata-rata Aktual</td>${avgActual.map(v => `<td>${Math.round(v)}</td>`).join('')}</tr>`;

    let analysisHTML = '';
    let footerLegend = '';

    if (isCH && isMonth && site !== 'ALL' && normalDataMapping[site]) {
        const normals = normalDataMapping[site];
        const diff = avgActual.map((v, i) => v - normals[i]);
        const sifat = avgActual.map((v, i) => {
            const n = normals[i];
            if (n === 0) return '-';
            const pct = (v / n) * 100;
            return pct > 115 ? '<span class="badge bg-primary badge-sifat">AN</span>' : (pct < 85 ? '<span class="badge bg-warning text-dark badge-sifat">BN</span>' : '<span class="badge bg-success badge-sifat">N</span>');
        });

        analysisHTML = `
            <tr class="row-ref"><td class="col-obs">Normal 30Th</td>${normals.map(v => `<td>${v}</td>`).join('')}</tr>
            ${rowActual}
            <tr class="table-group-divider"><td colspan="${cols+1}" class="bg-light text-center small fw-bold">DATA PER OBS</td></tr>
            ${rowsHTML}
            <tr class="table-group-divider"><td class="col-obs">Selisih</td>${diff.map(v => `<td>${Math.round(v)}</td>`).join('')}</tr>
            <tr class="row-result"><td class="col-obs">Sifat Hujan</td>${sifat.map(v => `<td>${v}</td>`).join('')}</tr>`;
        footerLegend = `<div class="p-2 small text-muted border-top"><span class="badge bg-primary">AN</span> Atas Normal (>115%) <span class="badge bg-success">N</span> Normal <span class="badge bg-warning text-dark">BN</span> Bawah Normal (<85%)</div>`;
    } else {
        analysisHTML = `${rowActual}<tr class="table-group-divider"><td colspan="${cols+1}" class="bg-light text-center small fw-bold">DATA PER OBS</td></tr>${rowsHTML}`;
    }

    // Headers
    let subHeader = '';
    if (isWeek) subHeader = `<tr>${months.map(m => `<th>1</th><th>2</th><th>3</th><th>4</th>`).join('')}</tr>`;
    else if (!isMonth) subHeader = `<tr>${months.map(m => `<th>1</th><th>2</th><th>3</th>`).join('')}</tr>`;

    return `
    <div class="scroll-container">
        <table class="table table-bordered table-recap mb-0" id="table-export">
            <thead>
                <tr><th rowspan="${isMonth ? 1 : 2}" style="min-width:100px">KODE</th>${months.map(m => `<th colspan="${isMonth ? 1 : (isWeek ? 4 : 3)}">${m}</th>`).join('')}</tr>
                ${isMonth ? '' : subHeader}
            </thead>
            <tbody>${analysisHTML}</tbody>
        </table>
    </div>${footerLegend}`;
}

    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: '/tncf-rainfallmonitor/' })
            .then(reg => {
                swRegistration = reg;
                console.log('[PWA] Service Worker terdaftar:', reg.scope);

                // Cek update saat SW baru tersedia
                reg.addEventListener('updatefound', () => {
                    newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // Ada versi baru — tampilkan banner update
                            document.getElementById('update-banner').classList.add('show');
                        }
                    });
                });

                // Cek update periodik (setiap 30 menit)
                setInterval(() => reg.update(), 30 * 60 * 1000);
            })
            .catch(err => console.warn('[PWA] SW gagal didaftarkan:', err));

        // Reload otomatis setelah SW diaktifkan
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (window._pwaUpdating) window.location.reload();
        });

        // Terima pesan dari SW (misal: sync data pending)
        navigator.serviceWorker.addEventListener('message', event => {
            if (event.data?.type === 'SYNC_PENDING_DATA') {
                syncPendingDataFromSW();
            }
        });
    });
}

function applyUpdate() {
    if (newWorker) {
        window._pwaUpdating = true;
        newWorker.postMessage({ action: 'skipWaiting' });
    }
    document.getElementById('update-banner').classList.remove('show');
}

/* ===== OFFLINE / ONLINE DETECTION ===== */
function showOfflineBar() {
    document.getElementById('offline-bar').classList.add('show');
    document.getElementById('online-bar').classList.remove('show');
}

function showOnlineBar() {
    document.getElementById('offline-bar').classList.remove('show');
    const onlineBar = document.getElementById('online-bar');
    onlineBar.classList.add('show');
    // Sembunyikan bar online setelah 3 detik
    setTimeout(() => onlineBar.classList.remove('show'), 3000);
}

window.addEventListener('offline', showOfflineBar);
window.addEventListener('online', () => {
    showOnlineBar();
    syncPendingDataFromSW();
});

// Set status awal saat load
if (!navigator.onLine) showOfflineBar();

/* ===== OFFLINE DATA QUEUE ===== */
// Simpan data pending di localStorage saat offline
function queueOfflineData(payload) {
    let queue = JSON.parse(localStorage.getItem('ch_offline_queue') || '[]');
    queue.push({ ...payload, _queuedAt: new Date().toISOString() });
    localStorage.setItem('ch_offline_queue', JSON.stringify(queue));
    console.log('[PWA] Data diantrekan untuk sync:', queue.length, 'item');

    // Daftarkan background sync jika browser mendukung
    if ('serviceWorker' in navigator && 'SyncManager' in window) {
        navigator.serviceWorker.ready.then(reg => {
            reg.sync.register('sync-rainfall-data').catch(err => console.warn('Sync register gagal:', err));
        });
    }
}

function syncPendingDataFromSW() {
    if (isSimulated) return;
    const queue = JSON.parse(localStorage.getItem('ch_offline_queue') || '[]');
    if (queue.length === 0) return;

    console.log('[PWA] Menyinkronkan', queue.length, 'data pending...');
    const syncBar = document.getElementById('sync-indicator');
    syncBar.classList.add('show');

    let processed = 0;
    queue.forEach((payload, idx) => {
        google.script.run
            .withSuccessHandler(() => {
                processed++;
                const newQueue = JSON.parse(localStorage.getItem('ch_offline_queue') || '[]')
                    .filter(item => item._queuedAt !== payload._queuedAt);
                localStorage.setItem('ch_offline_queue', JSON.stringify(newQueue));
                if (processed === queue.length) {
                    syncBar.classList.remove('show');
                    Swal.fire('Sinkronisasi Selesai', `${processed} data berhasil dikirim.`, 'success');
                }
            })
            .withFailureHandler(() => { processed++; if (processed === queue.length) syncBar.classList.remove('show'); })
            .saveRainfallData(payload);
    });
}

// Override handleInput agar support offline queue
const _origHandleInput = handleInput;
function handleInputWithOffline(e) {
    e.preventDefault();
    const p = { site: document.getElementById('f-site').value, obs: document.getElementById('f-obs').value, tanggal: document.getElementById('f-date').value, ombro: document.getElementById('f-ombro').value, userInput: currentUser.nama };
    
    if (!navigator.onLine && !isSimulated) {
        queueOfflineData(p);
        Swal.fire('Tersimpan Lokal', 'Data akan dikirim otomatis saat koneksi kembali.', 'info');
        return;
    }
    _origHandleInput(e);
}
